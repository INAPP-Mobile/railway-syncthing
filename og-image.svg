<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C3FC5"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Syncthing logo text -->
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2">Syncthing</text>

  <!-- Tagline -->
  <text x="600" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle" letter-spacing="1">Continuous File Synchronization</text>

  <!-- Status boxes -->
  <rect x="200" y="370" width="220" height="70" rx="12" fill="rgba(108,63,197,0.2)" stroke="#6C3FC5" stroke-width="1.5"/>
  <text x="310" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="600">STARS</text>
  <text x="310" y="423" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="700">85K+</text>

  <rect x="490" y="370" width="220" height="70" rx="12" fill="rgba(108,63,197,0.2)" stroke="#6C3FC5" stroke-width="1.5"/>
  <text x="600" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="600">LICENSE</text>
  <text x="600" y="423" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="700">MPL-2.0</text>

  <rect x="780" y="370" width="220" height="70" rx="12" fill="rgba(108,63,197,0.2)" stroke="#6C3FC5" stroke-width="1.5"/>
  <text x="890" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="600">PULLS</text>
  <text x="890" y="423" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="700">100M+</text>

  <!-- Deploy button -->
  <rect x="420" y="480" width="360" height="50" rx="25" fill="url(#accent)"/>
  <text x="600" y="512" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="700">Deploy on Railway</text>

  <!-- Railway logo text -->
  <text x="600" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">railway-syncthing · Railway Template</text>
</svg>
