<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748B"/><stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Large sync arrows -->
  <g transform="translate(400,400)">
    <!-- Top arrow going right -->
    <path d="M-150,-80 L-60,-140 L-60,-20" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom arrow going left -->
    <path d="M150,80 L60,140 L60,20" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dashed arc traces -->
    <path d="M-150,-80 Q-200,0 -150,80" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="12 12" opacity="0.5"/>
    <path d="M150,80 Q200,0 150,-80" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="12 12" opacity="0.5"/>
  </g>
</svg>